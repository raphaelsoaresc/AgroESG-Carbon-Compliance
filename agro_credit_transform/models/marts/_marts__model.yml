version: 2

models:
  - name: fct_compliance_risk
    description: "Mart final de conformidade socioambiental (CAR) integrando riscos Ambientais, Sociais e monitoramento de Satélite (Ground Truth)."
    
    # 1. TESTES DE NÍVEL DE MODELO (Integridade das Regras de Negócio)
    data_tests:
      - dbt_utils.expression_is_true:
          # Se for ELIGIBLE, não pode ter embargo significativo (exceto ruído GIS)
          expression: "NOT (final_eligibility_status = 'ELIGIBLE' AND embargo_area_ha > 0.1)"
          name: "check_eligible_properties_environmental_limit"
      
      - dbt_utils.expression_is_true:
          # Se for ELIGIBLE, não pode ter match de trabalho escravo
          expression: "NOT (final_eligibility_status = 'ELIGIBLE' AND final_eligibility_status LIKE '%SOCIAL%')"
          name: "check_eligible_properties_social_limit"

      - dbt_utils.expression_is_true:
          # Se for ELIGIBLE, a declividade não pode ser superior a 45 graus
          expression: "NOT (final_eligibility_status = 'ELIGIBLE' AND max_slope_degrees > 45)"
          name: "check_eligible_properties_satellite_limit"

      # NOVO TESTE: REGRA DO GRANDE JUIZ (MAPBIOMAS)
      - dbt_utils.expression_is_true:
          # Se for ELIGIBLE, não pode ter desmatamento confirmado pós-2008
          expression: "NOT (final_eligibility_status = 'ELIGIBLE' AND mapbiomas_deforested_ha > 0.1)"
          name: "check_eligible_properties_mapbiomas_limit"

    columns:
      - name: area_ha
        data_tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: general_ndvi_mean
        data_tests:
          - dbt_utils.accepted_range:
              min_value: -1
              max_value: 1

      - name: final_eligibility_status
        data_tests:
          - accepted_values:
              values: [
                'ELIGIBLE', 
                'NOT ELIGIBLE - SOCIAL', 
                'NOT ELIGIBLE - TRADITIONAL TERRITORY',
                'NOT ELIGIBLE - CAR STATUS', 
                'NOT ELIGIBLE - IBAMA AMAZON (CMN 5.081)',
                'NOT ELIGIBLE - IBAMA', 
                'NOT ELIGIBLE - DEFORESTATION (MAPBIOMAS)', # <--- NOVO STATUS ADICIONADO
                'NOT ELIGIBLE - CONSERVATION UNIT',
                'NOT ELIGIBLE - SATELLITE',
                'WARNING - BORDERLINE SLOPE', 
                'AWAITING CLEARANCE', 
                'WARNING - OLD EMBARGO',
                'WARNING - RISK BY ADJACENCY', 
                'CONDITIONAL - RL DEFICIT'
              ]

      # ---- TESTES DE QUALIDADE E MÉTRICAS DE SATÉLITE ----
      - name: max_slope_degrees
        description: "Inclinação máxima detectada pelo SRTM."
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 90

      - name: app_ndvi_mean
        description: "Média de NDVI detectada especificamente nas zonas de APP (Hídrica)."
        data_tests:
          - dbt_utils.accepted_range:
              min_value: -1
              max_value: 1

      # ---- MÉTRICAS AMBIENTAIS E ESPACIAIS ----
      - name: embargo_area_ha
        description: "Área total embargada dentro do imóvel."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: mapbiomas_deforested_ha
        description: "Área desmatada confirmada pelo MapBiomas após Julho/2008."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: protected_area_overlap_ha
        description: "Área de sobreposição com territórios protegidos (TI/UC/Quilombola)."
        data_tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: car_status
        description: "Status do cadastro no SICAR (Ativo, Suspenso, Cancelado)."
        data_tests:
          - not_null