name: 'agro_credit_transform'
version: '1.0.0'
config-version: 2

profile: 'agro_credit_transform'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------
# 1. VARIÁVEIS GLOBAIS (Onde a mágica acontece)
# ---------------------------------------------------------------
vars:
  # Data do Marco Temporal (Código Florestal)
  forest_code_threshold_date: '2008-07-22'
  
  # Limite de tolerância para ruído de GPS/GIS (em hectares)
  gis_noise_ha_threshold: 0.1
  
  # Limite de tolerância percentual (0.005 = 0.5% da área da propriedade)
  gis_noise_pct_threshold: 0.005

  # --- OTIMIZAÇÃO ESPACIAL (Bounding Box para Mato Grosso) ---
  # Isso acelera drasticamente o ST_INTERSECTSBOX nos modelos de compliance
  bbox_min_lon: -62.0  # Oeste do MT
  bbox_max_lon: -46.0  # Leste do MT
  bbox_min_lat: -18.5  # Sul do MT
  bbox_max_lat: -7.0   # Norte do MT

# ---------------------------------------------------------------
# 2. CONFIGURAÇÃO DOS MODELOS
# ---------------------------------------------------------------
models:
  agro_credit_transform:
    +materialized: view
    
    # Camada de Limpeza e Padronização (Raw -> Staging)
    staging:
      +schema: agro_esg_staging
      +materialized: view

    # Camada de Transformação e Joins Complexos (Cruzamentos Espaciais)
    intermediate:
      +schema: agro_esg_intermediate
      +materialized: table # Recomendado table para performance em joins espaciais

    # Camada de Negócio e Consumo (Dashboards/API/Relatórios)
    marts:
      +schema: agro_esg_marts
      +materialized: table